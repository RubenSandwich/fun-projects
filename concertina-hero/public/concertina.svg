<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g transform="translate(3.5 -2)" stroke-linejoin="round">
    <!-- far end plate (blue); most of it is hidden behind the bellows -->
    <polygon points="40,14 49.53,19.5 49.53,30.5 40,36 30.47,30.5 30.47,19.5" fill="#4cc9f0"/>
    <!-- bellows: hexagonal fold rings stepping back to front -->
    <polygon points="35,17 45.18,22.875 45.18,34.625 35,40.5 24.82,34.625 24.82,22.875"
             fill="#ffb877" stroke="#3a2a20" stroke-width="1.4"/>
    <polygon points="32,18.8 42.57,24.9 42.57,37.1 32,43.2 21.43,37.1 21.43,24.9"
             fill="#fff3d0" stroke="#3a2a20" stroke-width="1.4"/>
    <polygon points="28,21.2 39.08,27.6 39.08,40.4 28,46.8 16.92,40.4 16.92,27.6"
             fill="#ffb877" stroke="#3a2a20" stroke-width="1.4"/>
    <polygon points="24,23.6 35.6,30.3 35.6,43.7 24,50.4 12.4,43.7 12.4,30.3"
             fill="#fff3d0" stroke="#3a2a20" stroke-width="1.4"/>
    <!-- near end plate (red) -->
    <polygon points="20,26 32.12,33 32.12,47 20,54 7.88,47 7.88,33"
             fill="#ff5d5d" stroke="#3a2a20" stroke-width="3"/>
    <!-- button grid on the near end -->
    <circle cx="16" cy="36" r="1.5" fill="#3a2a20"/>
    <circle cx="20" cy="36" r="1.5" fill="#3a2a20"/>
    <circle cx="24" cy="36" r="1.5" fill="#3a2a20"/>
    <circle cx="14" cy="40" r="1.5" fill="#3a2a20"/>
    <circle cx="18" cy="40" r="1.5" fill="#3a2a20"/>
    <circle cx="22" cy="40" r="1.5" fill="#3a2a20"/>
    <circle cx="26" cy="40" r="1.5" fill="#3a2a20"/>
    <circle cx="16" cy="44" r="1.5" fill="#3a2a20"/>
    <circle cx="20" cy="44" r="1.5" fill="#3a2a20"/>
    <circle cx="24" cy="44" r="1.5" fill="#3a2a20"/>
    <!-- strap-corner stud -->
    <circle cx="11" cy="31.5" r="1.4" fill="#3a2a20"/>
    <!-- unified paper outline -->
    <polygon points="7.88,33 30.47,19.5 40,14 49.53,19.5 49.53,30.5 32.12,47 20,54 7.88,47"
             fill="none" stroke="#3a2a20" stroke-width="3"/>
  </g>
</svg>
